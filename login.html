<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fallqyun | Login</title>

    <!-- GLOBAL CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- LOCAL STYLE -->
    <style>

        /* ========================= */
        /* LOGIN SECTION */
        /* ========================= */

        .login-section{
            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:140px 20px 80px;
        }

        /* LOGIN CONTAINER */

        .login-container{
            width:100%;
            max-width:520px;

            padding:50px;

            border-radius:35px;

            background:
                rgba(255,255,255,0.03);

            border:
                1px solid rgba(255,255,255,0.08);

            backdrop-filter:blur(18px);

            box-shadow:
                0 20px 45px rgba(0,0,0,0.35);

            transition:0.35s ease;
        }

        .login-container:hover{
            transform:
                translateY(-5px);
        }

        /* LOGIN TAG */

        .login-tag{
            display:inline-block;

            padding:8px 18px;

            border-radius:30px;

            background:
                rgba(255,255,255,0.05);

            border:
                1px solid rgba(255,255,255,0.08);

            color:#00ff9f;

            letter-spacing:2px;

            font-size:12px;

            margin-bottom:20px;
        }

        /* TITLE */

        .login-container h2{
            font-size:48px;

            margin-bottom:15px;
        }

        /* SUBTITLE */

        .login-subtitle{
            color:#9e9e9e;

            line-height:1.8;

            margin-bottom:35px;
        }

        /* FORM */

        .login-form{
            display:flex;
            flex-direction:column;

            gap:25px;
        }

        /* INPUT BOX */

        .input-box{
            display:flex;
            flex-direction:column;
        }

        /* LABEL */

        .input-box label{
            margin-bottom:12px;

            color:#d7d7d7;

            font-size:15px;
        }

        /* INPUT */

        .input-box input{
            width:100%;

            padding:18px 22px;

            border-radius:18px;

            border:
                1px solid rgba(255,255,255,0.08);

            background:
                rgba(255,255,255,0.03);

            color:white;

            font-size:15px;

            outline:none;

            transition:0.3s ease;
        }

        /* INPUT FOCUS */

        .input-box input:focus{
            border-color:
                rgba(0,255,159,0.45);

            box-shadow:
                0 0 18px rgba(0,255,159,0.12);
        }

        /* PLACEHOLDER */

        .input-box input::placeholder{
            color:#8f8f8f;
        }

        /* LOGIN BUTTON */

        .login-btn{
            margin-top:10px;

            padding:18px;

            border:none;

            border-radius:18px;

            background:#00ff9f;

            color:black;

            font-size:15px;
            font-weight:bold;

            cursor:pointer;

            transition:0.35s ease;

            box-shadow:
                0 15px 30px rgba(0,255,159,0.18);
        }

        /* HOVER */

        .login-btn:hover{
            transform:
                translateY(-5px);

            box-shadow:
                0 20px 40px rgba(0,255,159,0.24);
        }

        /* ========================= */
        /* REQUEST ACCESS BUTTON */
        /* ========================= */

        .request-access-btn{
            width:100%;

            padding:18px;

            border-radius:18px;

            text-decoration:none;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
                rgba(255,255,255,0.04);

            border:
                1px solid rgba(255,255,255,0.08);

            color:white;

            font-size:15px;
            font-weight:500;

            transition:0.35s ease;
        }

        .request-access-btn:hover{

            transform:
                translateY(-5px);

            border-color:
                rgba(0,255,159,0.35);

            box-shadow:
                0 15px 35px rgba(0,255,159,0.08);
        }

        /* RESPONSIVE */

        @media (max-width:768px){

            .login-container{
                padding:35px;
            }

            .login-container h2{
                font-size:38px;
            }
        }

    </style>

</head>

<body>

    <!-- NAVBAR -->
    <!-- ========================= -->

    <nav class="navbar">

        <!-- LEFT MENU -->
        <div class="nav-group left">

                About Me
            </a>

            <a href="dashboard.html" class="nav-link">
                Dashboard
            </a>

        </div>

        <!-- LOGO -->
        <div class="logo">

            <span class="logo-icon"></span>

            Fallqyun

        </div>

        <!-- RIGHT MENU -->
        <div class="nav-group right">

            <a href="projects.html" class="nav-link">
                Projects
            </a>

            <a
                href="login.html"
                class="nav-link active"
                id="authButton"
            >
                Login
            </a>

        </div>

        <!-- INDICATOR -->
        <div class="indicator"></div>

    <!-- ========================= -->
    <!-- LOGIN SECTION -->
    <!-- ========================= -->

    <section class="login-section">

        <div class="login-container">

            <span class="login-tag">
                SECURE ACCESS
            </span>

            <h2>
                Welcome Back
            </h2>

            <p class="login-subtitle">
                Sign in to continue your personal
                growth journey and unlock your
                dashboard experience.
            </p>

            <!-- FORM -->

            <form class="login-form">

                <!-- USERNAME -->

                <div class="input-box">

                    <label>Username</label>

                    <input
                        type="text"
                        placeholder="Enter your username"
                        required
                    >

                </div>

                <!-- PASSWORD -->

                <div class="input-box">

                    <label>Password</label>

                    <input
                        type="password"
                        placeholder="Enter your password"
                        required
                    >

                </div>

                <!-- BUTTON -->

                <button type="submit" class="login-btn">
                    Login Account
                </button>

                <!-- REQUEST ACCESS -->

                <a
                    href="https://instagram.com/fallqyun"
                    target="_blank"
                    class="request-access-btn"
                >

                    Request Access

                </a>

            </form>

        </div>

    </section>

    </footer>

    <!-- AUTH CONFIG -->
    <script src="auth.js"></script>

    <!-- GLOBAL JAVASCRIPT -->
    <script src="script.js"></script>

    <!-- LOGIN SCRIPT -->

    <script>

        const loginForm =
            document.querySelector(".login-form");

        loginForm.addEventListener(
            "submit",
            function(e){

                e.preventDefault();

                const username =
                    document.querySelector(
                        'input[type="text"]'
                    ).value;

                const password =
                    document.querySelector(
                        'input[type="password"]'
                    ).value;

                /* VALIDATION */

                if(
                    username === AUTH.username
                    &&
                    password === AUTH.password
                ){

                    localStorage.setItem(
                        "loggedIn",
                        "true"
                    );

                    alert(
                        "Login successful.\n\nWelcome back, Fallqyun."
                    );

                    window.location.href =
                        "dashboard.html";

                }else{

                    alert(
                        "Invalid username or password.\n\nPlease try again."
                    );

                }

            }
        );

    </script>

</body>

</html>
